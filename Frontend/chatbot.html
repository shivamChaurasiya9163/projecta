<div id="chatbot">

    <!-- Floating Chat Button -->
    <button id="chat-toggle">

        <svg width="28" height="28" viewBox="0 0 24 24" fill="white">

            <path
                d="M12 2C6.48 2 2 5.94 2 10.8c0 2.7 1.38 5.1 3.56 6.72L4.5 22l4.7-2.42c.9.18 1.83.27 2.8.27 5.52 0 10-3.94 10-8.8S17.52 2 12 2z" />

        </svg>

    </button>

    <!-- Chat Window -->

    <div id="chat-window">

        <!-- Header -->

        <div class="chat-header">

            <div class="chat-avatar">

                🤖

            </div>

            <div class="chat-title">

                <h3>SGenovix AI</h3>

                <span>Online</span>

            </div>

            <button id="close-chat">

                ✕

            </button>

        </div>

        <!-- Chat Messages -->

        <div id="chat-messages">

            <div class="bot-message">

                👋 Hello!

                <br><br>

                I'm the AI Assistant of

                <strong>SGenovix Technologies</strong>.

                <br><br>

                I can help you with:

                <ul>

                    <li>AI Development</li>

                    <li>Website Development</li>

                    <li>ERP Solutions</li>

                    <li>CRM Solutions</li>

                    <li>Cloud Services</li>

                    <li>Pricing</li>

                    <li>Portfolio</li>

                    <li>Contact Details</li>

                </ul>

            </div>

        </div>

        <!-- Suggested Questions -->

        <div class="quick-actions">

            <button class="quick-question">

                AI Services

            </button>

            <button class="quick-question">

                Website Development

            </button>

            <button class="quick-question">

                Pricing

            </button>

            <button class="quick-question">

                Contact

            </button>

        </div>

        <!-- Typing Indicator -->

        <div id="typing-indicator">

            <span></span>

            <span></span>

            <span></span>

        </div>

        <!-- Input -->

        <div class="chat-input">

            <input type="text" id="user-input" placeholder="Type your message...">

            <button id="send-message">

                ➤

            </button>

        </div>

    </div>

</div>
